name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check imports and syntax
        run: |
          python -m py_compile src/fetch_data.py src/ingest.py src/retriever.py app.py

      - name: Run unit tests
        run: |
          pip install pytest
          pytest tests/ -v
